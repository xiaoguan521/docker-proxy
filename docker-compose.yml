services:
  docker-proxy:
    build: .
    container_name: docker-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    command: ["-addr", ":5000"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
